name: gawleycorp

networks:
  gawleycorp:
    driver: bridge

volumes:
  lldap_data:
  mariadb_data:
  prosody_data:
  mail_data:
  roundcube_data:
  prometheus_data:
  grafana_data:
  immich_db_data:
  vaultwarden_data:

services:
  lldap:
    image: lldap/lldap:stable
    container_name: lldap
    restart: unless-stopped
    ports:
      - "3890:3890"
      - "17170:17170"
    volumes:
      - lldap_data:/data
    environment:
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET}
      - LLDAP_LDAP_BASE_DN=dc=gawley,dc=net
      - LLDAP_LDAP_USER_PASS=${LLDAP_ADMIN_PASS}
      - LLDAP_HTTP_URL=https://home.gawley.net
    networks:
      - gawleycorp
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=roundcubemail
      - MYSQL_USER=roundcube
      - MYSQL_PASSWORD=${MARIADB_ROUNDCUBE_PASSWORD}
    networks:
      - gawleycorp
  prosody:
    image: prosody/prosody:0.12
    container_name: prosody
    restart: unless-stopped
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5280:5280"
      - "5281:5281"
    volumes:
      - prosody_data:/var/lib/prosody
      - ./config/prosody:/etc/prosody/conf.d
    environment:
      - PROSODY_ADMINS=kgawley@gawley.net
    networks:
      - gawleycorp
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    restart: unless-stopped
    hostname: mail.gawley.net
    ports:
      - "25:25"
      - "143:143"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - mail_data:/var/mail
      - ./config/mailserver:/tmp/docker-mailserver
    environment:
      - ENABLE_LDAP=1
      - LDAP_SERVER_HOST=lldap
      - LDAP_SEARCH_BASE=ou=people,dc=gawley,dc=net
      - LDAP_BIND_DN=uid=admin,ou=people,dc=gawley,dc=net
      - LDAP_BIND_PW=${LLDAP_ADMIN_PASS}
      - LDAP_QUERY_FILTER_USER=(&(uid=%u)(objectClass=inetOrgPerson))
      - DOVECOT_PASS_FILTER=(&(uid=%u)(objectClass=inetOrgPerson))
      - POSTMASTER_ADDRESS=admin@gawley.net
      - OVERRIDE_HOSTNAME=mail.gawley.net
    cap_add:
      - NET_ADMIN
    networks:
      - gawleycorp
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: unless-stopped
    volumes:
      - roundcube_data:/var/roundcube/db
      - ./config/roundcube:/var/roundcube/config
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=mariadb
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=${MARIADB_ROUNDCUBE_PASSWORD}
      - ROUNDCUBEMAIL_DB_NAME=roundcubemail
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_PRODUCT_NAME=Gawley Corp Mail
    networks:
      - gawleycorp
    depends_on:
      - mariadb
      - mailserver
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - gawleycorp

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - gawleycorp
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SERVER_ROOT_URL=https://home.gawley.net/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    networks:
      - gawleycorp
    depends_on:
      - prometheus
  samba:
    image: servercontainers/samba:latest
    container_name: samba
    restart: unless-stopped
    ports:
      - "445:445"
      - "139:139"
    volumes:
      - ./config/samba/smb.conf:/etc/samba/smb.conf
      - /srv/shares/gawleycorp:/shares/gawleycorp
    environment:
      - SAMBA_WORKGROUP=GAWLEYCORP
      - SAMBA_SERVER_STRING=Gawleycorp File Server
    networks:
      - gawleycorp 
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - gawleycorp

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    volumes:
      - ./config/authelia:/config
    environment:
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_ENCRYPTION_KEY}
    networks:
      - gawleycorp
    depends_on:
      - redis
      - lldap
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    volumes:
      - ./config/homepage:/app/config
    networks:
      - gawleycorp
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/nginx/certs:/etc/nginx/certs
    networks:
      - gawleycorp
    depends_on:
      - lldap
      - prosody
      - mailserver
      - roundcube
      - grafana
      - homepage
      - authelia
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    volumes:
      - ./data/vaultwarden:/data
    environment:
      - DOMAIN=https://vault.gawley.net
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    networks:
      - gawleycorp

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    restart: unless-stopped
    volumes:
      - ./data/immich:/usr/src/app/upload
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    networks:
      - gawleycorp
    depends_on:
      - immich-postgres
      - immich-redis

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich_postgres
    restart: unless-stopped
    volumes:
      - immich_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=immich
    networks:
      - gawleycorp

  immich-redis:
    image: redis:alpine
    container_name: immich_redis
    restart: unless-stopped
    networks:
      - gawleycorp