<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gawleycorp Chat</title>
    <link rel="stylesheet" href="https://cdn.conversejs.org/12.0.0/dist/converse.min.css">
</head>
<body>
    <script src="https://cdn.conversejs.org/12.0.0/dist/converse.min.js"></script>
    <script>
        converse.initialize({
            websocket_url: 'ws://chat.gawley.net/xmpp-websocket',
            discover_connection_methods: false,
            i18n: 'en',
            show_controlbox_by_default: true,
            roster_groups: true
        });
    </script>
</body>
</html>
